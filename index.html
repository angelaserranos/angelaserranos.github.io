<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ángela Serranos Valencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. BARRA DE NAVEGACIÓN -->
    <!-- Estará fija en la parte superior. Los enlaces con "#" apuntan a los "id" de las secciones de abajo -->
    <nav class="barra-navegacion">
        <div class="logo">
            <img src="https://via.placeholder.com/30" alt="Logo" class="logo-img">
            <span>Ángela</span>
        </div>
        <ul class="enlaces">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#sobre-mi">Sobre mí</a></li>
            <li><a href="#habilidades">Habilidades</a></li>
            <li><a href="#experiencia">Experiencia</a></li>
            <li><a href="#proyectos">Proyectos</a></li>
        </ul>
    </nav>

    <!-- 2. PORTADA A PANTALLA COMPLETA (Hero Section) -->
    <!-- Le damos el id="inicio" para que el botón de arriba funcione -->
    <header id="inicio" class="portada">
        <div class="contenido-centrado">
            <img src="https://via.placeholder.com/150" alt="Ángela" class="foto-perfil">
            <h1>Hola, soy Ángela</h1>
            <p class="subtitulo">Soy Ingeniera Aeroespacial<span class="cursor">|</span></p>
        </div>
        <!-- Flecha para indicar que hay que bajar -->
        <a href="#sobre-mi" class="flecha-bajar">v</a>
    </header>

    <!-- 3. EL RESTO DE SECCIONES DE LA WEB -->
    <!-- Al bajar (hacer scroll), aparecerán estas secciones -->
    <section id="sobre-mi" class="seccion">
        <h2>Sobre mí</h2>
        <p>Aquí irá tu texto de presentación...</p>
    </section>

    <section id="habilidades" class="seccion">
        <h2>Habilidades</h2>
        <p>MATLAB, Python, C, LaTeX...</p>
    </section>

    <section id="experiencia" class="seccion">
        <h2>Experiencia</h2>
        <p>Madrid Space, Case Western Reserve University...</p>
    </section>

</body>
</html>
